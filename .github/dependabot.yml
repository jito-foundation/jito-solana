version: 2
updates:
  - package-ecosystem: cargo
    directories:
      - "/"
    schedule:
      interval: daily
      time: "08:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 6
    cooldown:
      default-days: 7

  # split from root directory schedule to avoid duplicate checks
  - package-ecosystem: cargo
    directories:
      - "/dev-bins"
      - "/ci/xtask"
      - "/programs/sbf"
    schedule:
      interval: daily
      time: "14:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 6
    cooldown:
      default-days: 7

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: weekly
      time: "08:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
    groups:
      docs-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: daily
      time: "08:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    cooldown:
      default-days: 7
