name: Backport v4.0

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'master' &&
      contains(github.event.pull_request.labels.*.name, 'v4.0') &&
      !contains(github.event.pull_request.labels.*.name, 'feature-gate')
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Import backport signing key
        id: import-gpg
        uses: crazy-max/ghaction-import-gpg@v6.3.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_config_global: true
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Create v4.0 backport PR
        uses: korthout/backport-action@v3
        with:
          github_token: ${{ secrets.BACKPORT_TOKEN }}
          git_committer_name: ${{ steps.import-gpg.outputs.name }}
          git_committer_email: ${{ steps.import-gpg.outputs.email }}
          label_pattern: ''
          target_branches: v4.0
          pull_title: '${target_branch}: ${pull_title} (backport of #${pull_number})'
          pull_description: |
            Backport of #${pull_number} to `${target_branch}`.

            This PR was created automatically from a merged `master` PR labeled `${target_branch}`.
