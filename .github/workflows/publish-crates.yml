name: Publish Crates

on:
  # Invoked from release.yml
  workflow_call:

  workflow_dispatch:

permissions: {}

jobs:
  package:
    if: github.repository == 'anza-xyz/agave'
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
    outputs:
      docker_image: ${{ steps.docker.outputs.image }}
      layers: ${{ steps.layers.outputs.layers }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Verify tag matches workspace version
        env:
          REF_NAME: ${{ github.ref_name }}
          REF_TYPE: ${{ github.ref_type }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${REF_TYPE}" != "tag" ]]; then
            echo "::error::This workflow must run against a tag (got ref_type=${REF_TYPE}, ref_name=${REF_NAME})"
            exit 1
          fi
          expected="${REF_NAME#v}"
          for manifest in Cargo.toml programs/sbf/Cargo.toml; do
            if ! grep -q "^version = \"${expected}\"$" "${manifest}"; then
              actual=$(grep -m1 '^version = "' "${manifest}" || true)
              echo "::error file=${manifest}::Tag ${REF_NAME} expects version \"${expected}\" but ${manifest} has: ${actual}"
              exit 1
            fi
          done

      - name: Resolve Docker image
        id: docker
        shell: bash
        run: |
          set -euo pipefail
          source ci/docker/env.sh
          echo "image=${CI_DOCKER_IMAGE}" >> "${GITHUB_OUTPUT}"

      # Compute publish layers from cargo xtask publish order.
      - name: Compute publish layers
        id: layers
        env:
          DOCKER_IMAGE: ${{ steps.docker.outputs.image }}
        shell: bash
        run: |
          set -euo pipefail
          raw=$(docker run --rm \
            -v "${PWD}:/solana" -w /solana \
            "${DOCKER_IMAGE}" \
            cargo xtask publish order --format json)
          layers=$(jq -c 'map(map({name}))' <<<"${raw}")
          echo "layers=${layers}" >> "${GITHUB_OUTPUT}"

      - name: Package crates
        env:
          DOCKER_IMAGE: ${{ steps.docker.outputs.image }}
          LAYERS: ${{ steps.layers.outputs.layers }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/crate-staging
          jq -r '.[][].name | "-p", .' <<<"${LAYERS}" \
            | xargs -r docker run --rm \
              -v "${PWD}:/solana" -w /solana \
              "${DOCKER_IMAGE}" \
              cargo package --no-verify
          cp -v target/package/*.crate target/crate-staging/

      - name: Upload crate artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: crate-files
          path: target/crate-staging/*.crate
          if-no-files-found: error
          retention-days: 7

  attest:
    needs: package
    runs-on: ubuntu-24.04
    environment: prod
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Download crate artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: crate-files
          path: target/crate-staging

      - name: Attest crate files
        # actions/attest with only subject-path auto-generates SLSA build provenance
        # (attest-build-provenance is now just a thin wrapper over this).
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763  # v4.1.1
        env:
          NODE_OPTIONS: --max-http-header-size=32768
        with:
          subject-path: target/crate-staging/*.crate

  publish:
    needs: [package, attest]
    runs-on: ubuntu-24.04
    environment: prod
    permissions:
      id-token: write
      contents: read
    strategy:
      max-parallel: 1
      matrix:
        layer: ${{ fromJson(needs.package.outputs.layers) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      # Fresh crates.io token per layer job.
      - name: Mint crates.io token
        id: auth
        uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe  # v1.0.4

      - name: Publish layer
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          DOCKER_IMAGE: ${{ needs.package.outputs.docker_image }}
          LAYER_CRATES: ${{ toJson(matrix.layer) }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          set -euo pipefail
          export CRATE_VERSION="${REF_NAME#v}"
          jq -r '.[].name' <<<"${LAYER_CRATES}" | ci/publish-crates-layer.sh
