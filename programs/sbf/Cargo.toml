[profile.dev]
debug = "line-tables-only"

[profile.full-dev]
inherits = "dev"
debug = "full"

[profile.release]
# The test programs are build in release mode
# Minimize their file size so that they fit into the account size limit
strip = true

[[bench]]
name = "bpf_loader"
