[package]
name = "solana-sbf-programs"
documentation = "https://docs.rs/solana"
readme = "README.md"
publish = false
version = { workspace = true }
authors = { workspace = true }
description = { workspace = true }
repository = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
edition = { workspace = true }

[workspace]
members = [
    "rust/128bit",
    "rust/128bit_dep",
    "rust/account_mem",
    "rust/account_mem_deprecated",
    "rust/alloc",
    "rust/alt_bn128",
    "rust/alt_bn128_compression",
    "rust/big_mod_exp",
    "rust/call_args",
    "rust/call_depth",
    "rust/caller_access",
    "rust/curve25519",
    "rust/custom_heap",
    "rust/dep_crate",
    "rust/deprecated_loader",
    "rust/direct_account_pointers_in_program_input",
    "rust/divide_by_zero",
    "rust/dup_accounts",
    "rust/error_handling",
    "rust/external_spend",
    "rust/inner_instruction_alignment_check",
    "rust/instruction_introspection",
    "rust/invoke",
    "rust/invoke_and_error",
    "rust/invoke_and_ok",
    "rust/invoke_and_return",
    "rust/invoked",
    "rust/iter",
    "rust/log_data",
    "rust/many_args",
    "rust/many_args_dep",
    "rust/mem",
    "rust/mem_dep",
    "rust/membuiltins",
    "rust/noop",
    "rust/panic",
    "rust/param_passing",
    "rust/param_passing_dep",
    "rust/poseidon",
    "rust/r2_instruction_data_pointer",
    "rust/rand",
    "rust/realloc",
    "rust/realloc_invoke",
    "rust/remaining_compute_units",
    "rust/ro_account_modify",
    "rust/ro_modify",
    "rust/sanity",
    "rust/secp256k1_recover",
    "rust/sha",
    "rust/sibling_inner_instructions",
    "rust/sibling_instructions",
    "rust/simulation",
    "rust/spoof1",
    "rust/spoof1_system",
    "rust/syscall-get-epoch-stake",
    "rust/sysvar",
    "rust/upgradeable",
    "rust/upgraded",
]
[workspace.package]
version = "4.1.0-rc.1"
description = "Solana SBF test program written in Rust"
authors = ["Anza Maintainers <maintainers@anza.xyz>"]
repository = "https://github.com/anza-xyz/agave"
homepage = "https://anza.xyz"
license = "Apache-2.0"
edition = "2021"

[workspace.lints.rust]
# List of rust-2024-compatibility lints that are already satisfied
# See https://doc.rust-lang.org/rustc/lints/groups.html
boxed_slice_into_iter = "deny"
dependency_on_unit_never_type_fallback = "deny"
deprecated_safe_2024 = "deny"
impl_trait_overcaptures = "deny"
missing_unsafe_on_extern = "deny"
never_type_fallback_flowing_into_unsafe = "deny"
rust_2024_guarded_string_incompatible_syntax = "deny"
rust_2024_incompatible_pat = "deny"
rust_2024_prelude_collisions = "deny"
static_mut_refs = "deny"
unsafe_attr_outside_unsafe = "deny"
unsafe_op_in_unsafe_fn = "deny"

[workspace.lints.rust.unexpected_cfgs]
level = "warn"
check-cfg = [
    'cfg(target_os, values("solana"))',
    'cfg(feature, values("custom-panic", "custom-heap", "sbpf-v3"))',
    'cfg(target_feature, values("dynamic-frames"))',
]

[workspace.dependencies]
agave-feature-set = { path = "../../feature-set", version = "=4.1.0-rc.1" }
agave-logger = { path = "../../logger", version = "=4.1.0-rc.1" }
agave-reserved-account-keys = { path = "../../reserved-account-keys", version = "=4.1.0-rc.1" }
agave-validator = { path = "../../validator", version = "=4.1.0-rc.1" }
array-bytes = "=1.4.1"
bincode = { version = "1.1.4", default-features = false }
blake3 = "1.0.0"
borsh = "1.5.1"
byteorder = "1.3.2"
libsecp256k1 = { version = "0.7.2", default-features = false }
num-derive = "0.4.2"
num-traits = "0.2"
serde = { version = "1.0.112", features = ["derive"] }
serde_json = "1.0.149"
solana-account-info = "=3.1.1"
solana-account-view = "=2.0.0"
solana-address = "=2.6.0"
solana-big-mod-exp = "=3.0.0"
solana-blake3-hasher = { version = "=3.1.0", features = ["blake3"] }
solana-bn254 = "=3.2.1"
solana-clock = { version = "=3.0.1", features = ["serde", "sysvar"] }
solana-compute-budget = { path = "../../compute-budget", version = "=4.1.0-rc.1" }
solana-compute-budget-instruction = { path = "../../compute-budget-instruction", version = "=4.1.0-rc.1" }
solana-cpi = "=3.1.0"
solana-curve25519 = "=4.0.0"
solana-define-syscall = "=3.0.0"
solana-fee = { path = "../../fee", version = "=4.1.0-rc.1" }
solana-hash = { version = "=4.3.0", features = ["bytemuck", "serde", "std"] }
solana-instruction = "=3.4.0"
solana-instructions-sysvar = "=3.0.0"
solana-keccak-hasher = { version = "=3.1.0", features = ["sha3"] }
solana-msg = "=3.1.0"
solana-poseidon = "=4.0.0"
solana-program = "=4.0.0"
solana-program-entrypoint = "=3.1.1"
solana-program-error = "=3.0.1"
solana-program-memory = "=3.1.0"
solana-program-runtime = { path = "../../program-runtime", version = "=4.1.0-rc.1" }
solana-pubkey = { version = "=4.2.0", default-features = false }
solana-runtime = { path = "../../runtime", version = "=4.1.0-rc.1" }
solana-runtime-transaction = { path = "../../runtime-transaction", version = "=4.1.0-rc.1" }
solana-sbf-rust-128bit-dep = { path = "rust/128bit_dep", version = "=4.1.0-rc.1" }
solana-sbf-rust-invoke-dep = { path = "rust/invoke_dep", version = "=4.1.0-rc.1" }
solana-sbf-rust-invoked-dep = { path = "rust/invoked_dep", version = "=4.1.0-rc.1" }
solana-sbf-rust-many-args-dep = { path = "rust/many_args_dep", version = "=4.1.0-rc.1" }
solana-sbf-rust-mem-dep = { path = "rust/mem_dep", version = "=4.1.0-rc.1" }
solana-sbf-rust-param-passing-dep = { path = "rust/param_passing_dep", version = "=4.1.0-rc.1" }
solana-sbf-rust-realloc-dep = { path = "rust/realloc_dep", version = "=4.1.0-rc.1" }
solana-sbf-rust-realloc-invoke-dep = { path = "rust/realloc_invoke_dep", version = "=4.1.0-rc.1" }
solana-sdk-ids = "=3.1.0"
solana-secp256k1-recover = "=3.1.1"
solana-sha256-hasher = { version = "=3.1.0", features = ["sha2"] }
solana-stake-interface = { version = "=3.1.0", features = ["bincode"] }
solana-svm = { path = "../../svm", version = "=4.1.0-rc.1" }
solana-svm-feature-set = { path = "../../svm-feature-set", version = "=4.1.0-rc.1" }
solana-svm-test-harness-instr = { path = "../../svm-test-harness/instr", version = "=4.1.0-rc.1" }
solana-svm-timings = { path = "../../svm-timings", version = "=4.1.0-rc.1" }
solana-svm-transaction = { path = "../../svm-transaction", version = "=4.1.0-rc.1" }
solana-svm-type-overrides = { path = "../../svm-type-overrides", version = "=4.1.0-rc.1" }
solana-system-interface = { version = "=3.2", features = ["bincode"] }
solana-sysvar = "=4.0.0"
solana-vote = { path = "../../vote", version = "=4.1.0-rc.1" }
solana-vote-interface = "6.0.0"
solana-vote-program = { path = "../../programs/vote", version = "=4.1.0-rc.1" }
test-case = "3.3.1"
thiserror = "2.0"

[features]
sbf_c = []
sbf_rust = []
sbf_sanity_list = []
sbpf-v3 = []
dummy-for-ci-check = ["sbf_c", "sbf_rust", "sbf_sanity_list", "sbpf-v3"]
# This was needed for ci
frozen-abi = []

[dev-dependencies]
agave-feature-set = { workspace = true }
agave-logger = { workspace = true }
agave-reserved-account-keys = { workspace = true }
agave-validator = { workspace = true }
bincode = { workspace = true }
borsh = { workspace = true }
solana-account = "4.0.0"
solana-account-info = "3.1.0"
solana-client-traits = "4.0.0"
solana-clock = "3.0.0"
solana-cluster-type = "3.0.0"
solana-compute-budget = { workspace = true }
solana-compute-budget-instruction = { workspace = true, features = [
    "dev-context-only-utils",
] }
solana-compute-budget-interface = "3.0.0"
solana-fee = { workspace = true }
solana-fee-calculator = "3.2.0"
solana-fee-structure = "3.0.0"
solana-hash = "4.3.0"
solana-instruction = { workspace = true }
solana-keypair = "3.1.2"
solana-loader-v3-interface = "7.0.0"
solana-message = "4.1.0"
solana-program-runtime = { workspace = true, features = ["dev-context-only-utils"] }
solana-pubkey = "4.2.0"
solana-rent = "4.1.0"
solana-runtime = { workspace = true, features = ["dev-context-only-utils"] }
solana-runtime-transaction = { workspace = true, features = [
    "dev-context-only-utils",
] }
solana-sbf-rust-invoke-dep = { workspace = true }
solana-sbf-rust-realloc-dep = { workspace = true }
solana-sbf-rust-realloc-invoke-dep = { workspace = true }
solana-sdk-ids = "3.1.0"
solana-signer = "3.0.0"
solana-stake-interface = "3.0.0"
solana-svm = { workspace = true }
solana-svm-feature-set = { workspace = true }
solana-svm-test-harness-instr = { workspace = true }
solana-svm-timings = { workspace = true }
solana-svm-transaction = { workspace = true }
solana-svm-type-overrides = { workspace = true }
solana-system-interface = { workspace = true }
solana-sysvar = "4.0.0"
solana-transaction = "4.1.0"
solana-transaction-error = "3.2.0"
solana-vote = { workspace = true }
solana-vote-interface = { workspace = true }
solana-vote-program = { workspace = true }
test-case = { workspace = true }

[profile.dev]
debug = "line-tables-only"

[profile.full-dev]
inherits = "dev"
debug = "full"

# Enable basic optimizations for unittests to trigger const propagation and inlining
[profile.ci]
inherits = "test"
opt-level = 1

[profile.release]
# The test programs are build in release mode
# Minimize their file size so that they fit into the account size limit
strip = true
