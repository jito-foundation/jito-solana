[package]
name = "solana-remote-wallet"
documentation = "https://docs.rs/solana-remote-wallet"
version = { workspace = true }
authors = { workspace = true }
description = { workspace = true }
repository = { workspace = true }
homepage = { workspace = true }
license = { workspace = true }
edition = { workspace = true }

[package.metadata.docs.rs]
targets = ["x86_64-unknown-linux-gnu"]

[features]
default = ["linux-static-hidraw"]
agave-unstable-api = []
keystone = [
    "dep:hex",
    "dep:rusb",
    "dep:serde_json",
    "dep:ur-parse-lib",
    "dep:ur-registry",
]
linux-shared-hidraw = ["hidapi/linux-shared-hidraw"]
linux-shared-libusb = ["hidapi/linux-shared-libusb"]
linux-static-hidraw = ["hidapi/linux-static-hidraw"]
linux-static-libusb = ["hidapi/linux-static-libusb"]

[dependencies]
console = { workspace = true }
dialoguer = { workspace = true }
hex = { workspace = true, optional = true }
hidapi = { workspace = true, optional = true }
log = { workspace = true }
num-derive = { workspace = true }
num-traits = { workspace = true }
parking_lot = { workspace = true }
rusb = { workspace = true, optional = true }
semver = { workspace = true }
serde_json = { workspace = true, optional = true }
solana-derivation-path = { workspace = true }
solana-offchain-message = { workspace = true }
solana-pubkey = { workspace = true, features = ["std"] }
solana-signature = { workspace = true, features = ["std"] }
solana-signer = { workspace = true }
thiserror = { workspace = true }
trezor-client = { workspace = true }
ur-parse-lib = { workspace = true, optional = true }
ur-registry = { workspace = true, optional = true }
uriparse = { workspace = true }

[dev-dependencies]
assert_matches = { workspace = true }
serial_test = { workspace = true }
solana-pubkey = { workspace = true, features = ["rand"] }

[lints]
workspace = true
